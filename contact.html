<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | La Reemée</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <a href="index.html" class="logo">
        <div class="logo-text">La Reemée</div>
        <div class="logo-subtitle">Baked Goods</div>
    </a>

    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="order.html">🛒 Cart</a>
    </nav>
</header>

<section class="contact-hero">
    <p class="section-label">Get in Touch</p>
    <h1>Contact Us</h1>
    <p>Have a question about an order, pickup, or availability? We'd love to hear from you.</p>
</section>

<section class="contact-page">
    
    <div class="contact-form-side">
        <h2>Have a Question?<br>Let's Chat!</h2>
        <p class="contact-subtext">Fill out the form below and we'll get back to you as soon as possible.</p>

        <form class="contact-page-form" action="mailto:hello@lareemee.com" method="post" enctype="text/plain">

            <div class="contact-name-row">
                <div class="contact-name-field">
                    <label for="contact-first">First Name</label>
                    <input type="text" id="contact-first" name="First Name" placeholder="First name" required>
                </div>
                <div class="contact-name-field">
                    <label for="contact-last">Last Name</label>
                    <input type="text" id="contact-last" name="Last Name" placeholder="Last name" required>
                </div>
            </div>

            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" name="Email" placeholder="Your email" required>

            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="Message" placeholder="What can we help you with?" required></textarea>

            <button type="submit">Send Message</button>

        </form>
    </div>

    <div class="contact-photo">
        <img src="images/adding-frosting.jpg" alt="Baker adding frosting to cinnamon rolls">
    </div>

</section>

<footer>
    <p>© 2026 La Reemée Baked Goods</p>
</footer>

</body>    
</html>
